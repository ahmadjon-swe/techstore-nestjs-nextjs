version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: techstore-db-1
    environment:
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: techstore
    volumes:
      - techstore_db_data:/var/lib/postgresql/data
    expose:
      - '5432'
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U techstore -d techstore']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: techstore-api-1
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://techstore:${POSTGRES_PASSWORD}@db:5432/techstore
      NODE_ENV: production
    env_file:
      - .env.production
    ports:
      - '127.0.0.1:4000:4000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:4000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: techstore-web-1
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    env_file:
      - .env.production
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: techstore-nginx-1
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - techstore_uploads:/app/uploads:ro
    restart: unless-stopped

volumes:
  techstore_db_data:
  techstore_uploads:
