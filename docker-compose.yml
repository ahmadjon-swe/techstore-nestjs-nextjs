version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: techstore-db-1
    environment:
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: techstore
    volumes:
      - techstore_db_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U techstore -d techstore']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: techstore-api-1
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://techstore:${POSTGRES_PASSWORD:-password}@db:5432/techstore
      NODE_ENV: development
    env_file:
      - .env
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    command: pnpm --filter @techstore/api start:dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: techstore-web-1
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NODE_ENV: development
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next

volumes:
  techstore_db_data:
