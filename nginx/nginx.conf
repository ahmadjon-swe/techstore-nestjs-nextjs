events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1024;

  upstream api {
    server techstore-api-1:4000;
  }

  upstream web {
    server techstore-web-1:3000;
  }

  # HTTP only — SSL is terminated by the host proxy (CheckLab nginx / Caddy).
  # This container listens on port 80, exposed as 127.0.0.1:3110 on the host.
  server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Trust X-Forwarded-Proto from the upstream host proxy
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    # Static uploads served from Docker volume
    location /uploads/ {
      alias /app/uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Google OAuth initiation — must reach NestJS directly (redirects to Google)
    location /api/auth/google {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Public catalog + health — no auth, no Next.js handler, go direct to NestJS
    location /api/catalog/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/health {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Everything else goes to Next.js route handlers, which read the HttpOnly
    # auth cookie and add the Bearer token before proxying to NestJS.
    # This covers: /api/auth/*, /api/cart/*, /api/wishlist/*, /api/orders/*,
    #              /api/users/*, /api/admin/*, /api/inventory/*, /api/payments/*
    location /api/ {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Next.js storefront
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
  }
}
