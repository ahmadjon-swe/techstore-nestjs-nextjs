events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1024;

  upstream api {
    server techstore-api-1:4000;
  }

  upstream web {
    server techstore-web-1:3000;
  }

  # HTTP only — SSL is terminated by the host proxy (CheckLab nginx / Caddy).
  # This container listens on port 80, exposed as 127.0.0.1:3110 on the host.
  server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Trust X-Forwarded-Proto from the upstream host proxy
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    # Static uploads served from Docker volume
    location /uploads/ {
      alias /app/uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Google OAuth must reach NestJS directly (initiates redirect to Google)
    location /api/auth/google {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Auth cookie routes are Next.js route handlers (they call NestJS internally
    # and set HttpOnly cookies — if nginx sent them to NestJS directly, no cookie
    # would ever be set and users could never log in).
    location /api/auth/ {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # All other API traffic → NestJS
    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Next.js storefront
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
  }
}
