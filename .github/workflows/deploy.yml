name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '24'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/techstore

jobs:
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.vars.outputs.sha_short }}

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DEV_MODE=${{ secrets.NEXT_PUBLIC_DEV_MODE }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.vars.outputs.sha_short }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'docker-compose.prod.yml,nginx/'
          target: '/opt/techstore'

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/techstore

            SHA=${{ needs.build-push.outputs.sha_short }}
            API_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${SHA}
            WEB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${SHA}

            # Pull new images
            docker pull ${API_IMAGE}
            docker pull ${WEB_IMAGE}

            # Tag for docker-compose.prod.yml (compose picks these up via image: field)
            docker tag ${API_IMAGE} techstore-api:deploy
            docker tag ${WEB_IMAGE} techstore-web:deploy

            # 1. Bring up the database first and wait for it to be healthy
            docker compose -f docker-compose.prod.yml up -d db
            docker compose -f docker-compose.prod.yml wait db

            # 2. Run DB migrations inside a one-shot API container
            #    (prisma is in dependencies, so it's present in the production image)
            docker run --rm \
              --env-file /opt/techstore/.env.production \
              --network techstore-network \
              ${API_IMAGE} \
              pnpm --filter @techstore/db migrate:deploy

            # 3. Start / update remaining services with the new images
            docker compose -f docker-compose.prod.yml up -d --no-build --pull never

            # 4. Health check through nginx (port 3110) — API port 4000 is internal only
            sleep 5
            curl -fsS http://127.0.0.1:3110/api/health \
              || (docker compose -f docker-compose.prod.yml logs api && exit 1)

            # 5. Prune old images to free disk space
            docker image prune -f
